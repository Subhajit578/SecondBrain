server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        proxy_pass http://backend:3000;
    }
    location /app/ {
        proxy_pass http://backend:3000;
        proxy_connect_timeout 10s;
    }
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}